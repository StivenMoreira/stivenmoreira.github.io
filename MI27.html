    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.55));
      pointer-events: none;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding: max(16px, env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
      position:relative;
      z-index:1;
    }

    .card{
      width:min(720px, 94vw);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(6px);
      border-radius:16px;
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      overflow:hidden;
      margin:0 auto;
    }

    img, .photo{ max-width:100%; height:auto; display:block; }
    .photo{ width:100%; }

    .content{
      padding: 18px 16px 22px;
      line-height:1.6;
      font-size: clamp(16px, 2.8vw, 18px);
      text-align:center;
    }
    .content p{ margin:0; }
    .signature{ margin-top:12px; font-size: clamp(13px, 2.6vw, 14px); opacity:.8; }

    .footer{
      text-align:center;
      color:#f1f5f9;
      font-size:12px;
      margin-top:10px;
      opacity:.85;
      position:relative;
      z-index:1;
    }

    .hearts span{
      position: fixed;
      bottom:-40px;
      width:18px; height:18px;
      background:#e63946;
      transform:rotate(45deg);
      opacity:.18;
      animation: float 8s linear infinite;
      border-radius:2px;
      z-index:0;
    }
    .hearts span::before, .hearts span::after{
      content:"";
      position:absolute;
      width:18px; height:18px;
      background:#e63946;
      border-radius:50%;
    }
    .hearts span::before{ left:-9px; top:0; }
    .hearts span::after { top:-9px; left:0; }

    @keyframes float{
      0%{ transform: translateY(0) rotate(45deg); }
      100%{ transform: translateY(-140vh) rotate(45deg); }
    }

    /* random positions */
    .hearts span:nth-child(1){ left:11vw; animation-duration:7s; animation-delay:-1s; opacity:.11; }
    .hearts span:nth-child(2){ left:22vw; animation-duration:8s; animation-delay:-2s; opacity:.12; }
    .hearts span:nth-child(3){ left:33vw; animation-duration:9s; animation-delay:-3s; opacity:.13; }
    .hearts span:nth-child(4){ left:44vw; animation-duration:7s; animation-delay:-4s; opacity:.14; }
    .hearts span:nth-child(5){ left:55vw; animation-duration:10s; animation-delay:-1s; opacity:.15; }
    .hearts span:nth-child(6){ left:66vw; animation-duration:8s; animation-delay:-2s; opacity:.12; }
    .hearts span:nth-child(7){ left:77vw; animation-duration:9s; animation-delay:-3s; opacity:.1; }
    .hearts span:nth-child(8){ left:88vw; animation-duration:7s; animation-delay:-4s; opacity:.14; }
    .hearts span:nth-child(9){ left:15vw; animation-duration:8s; animation-delay:-2s; opacity:.11; }
    .hearts span:nth-child(10){ left:70vw; animation-duration:10s; animation-delay:-3s; opacity:.12; }

    @media (max-width: 420px){
      .card{ border-radius:14px; }
      .content{ padding:16px 14px 20px; }
    }
    @supports (padding: max(0px)){
      .wrap{ padding-bottom: max(24px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>

  <div class="hearts">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
